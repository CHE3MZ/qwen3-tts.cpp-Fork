# GPU Release Builds — CUDA (Windows), Metal (macOS), Vulkan (Windows)
#
# Trigger: manual only (workflow_dispatch). No automatic triggers whatsoever.
# Produces a zip artifact for each backend uploaded to the workflow run (30-day retention).
#
# Usage:
#   Actions tab → "GPU Release Builds" → Run workflow → pick backend

name: GPU Release Builds

on:
  workflow_dispatch:
    inputs:
      backend:
        description: 'Which backend to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cuda
          - metal
          - vulkan

# ──────────────────────────────────────────────────────────────────────────────
# CUDA Windows — Chocolatey installs CUDA natively (no .NET bootstrapper)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-cuda-windows:
    name: CUDA (Windows)
    if: ${{ github.event.inputs.backend == 'cuda' || github.event.inputs.backend == 'all' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (fixed)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.8.0'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      - name: Verify CUDA install
        shell: pwsh
        run: |
          $cudaPath = $env:CUDA_PATH
          if (-not $cudaPath) {
            # Fallback: search standard location
            $cudaBase = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA"
            if (Test-Path $cudaBase) {
              $cudaPath = (Get-ChildItem $cudaBase -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
            }
          }
          if (-not $cudaPath) { Write-Error "CUDA_PATH not set and not found in standard location"; exit 1 }
          Write-Host "CUDA at: $cudaPath"
          & "$cudaPath\bin\nvcc.exe" --version
          echo "CUDAToolkit_ROOT=$cudaPath" >> $env:GITHUB_ENV
          echo "$cudaPath\bin" >> $env:GITHUB_PATH

      - name: Configure GGML (CUDA)
        shell: cmd
        run: >
          cmake -S ggml -B ggml\build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DGGML_CUDA=ON
          -DGGML_CUDA_F16=ON
          -DCUDAToolkit_ROOT="%CUDAToolkit_ROOT%"
          -DCMAKE_CUDA_FLAGS="--allow-unsupported-compiler"
          -DCMAKE_CUDA_HOST_COMPILER="%VCToolsInstallDir%\bin\Hostx64\x64\cl.exe"

      - name: Build GGML
        shell: cmd
        run: cmake --build ggml\build --config Release -j 4

      - name: Configure project
        shell: cmd
        run: >
          cmake -S . -B build-release
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        shell: cmd
        run: cmake --build build-release --config Release -j 4

      - name: Package
        shell: pwsh
        run: |
          $out="dist-cuda"
          New-Item -ItemType Directory -Force $out
          New-Item -ItemType Directory -Force "$out/include"

          Copy-Item build-release\qwen3-tts-cli.exe $out -ErrorAction SilentlyContinue
          Copy-Item build-release\qwen3tts.dll $out -ErrorAction SilentlyContinue
          Get-ChildItem build-release\ggml*.dll | Copy-Item -Destination $out -Force -ErrorAction SilentlyContinue
          Copy-Item src\qwen3tts_c_api.h "$out/include/"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-tts-cuda-windows
          path: dist-cuda/
          retention-days: 30

# ──────────────────────────────────────────────────────────────────────────────
# Metal — macOS (Apple Silicon, Metal built-in)
# ──────────────────────────────────────────────────────────────────────────────
  build-metal:
    name: Metal (macOS)
    if: ${{ github.event.inputs.backend == 'metal' || github.event.inputs.backend == 'all' }}
    runs-on: macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure GGML with Metal
        run: |
          cmake -S ggml -B ggml/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON

      - name: Build GGML
        run: cmake --build ggml/build --config Release -j $(sysctl -n hw.logicalcpu)

      - name: Configure project
        run: cmake -S . -B build-release -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build-release --config Release -j $(sysctl -n hw.logicalcpu)

      - name: Package artifact
        run: |
          mkdir -p dist-metal/include
          cp build-release/qwen3-tts-cli      dist-metal/ 2>/dev/null || true
          cp build-release/libqwen3tts.dylib  dist-metal/ 2>/dev/null || true
          find ggml/build -name 'libggml*.dylib' -exec cp {} dist-metal/ \; 2>/dev/null || true
          find ggml/build -name '*.metallib'     -exec cp {} dist-metal/ \; 2>/dev/null || true
          cp src/qwen3tts_c_api.h dist-metal/include/
          # Upload artifact action wraps in its own zip — upload the folder directly
          # to avoid a zip-inside-zip. We pass the folder path, not a .zip file.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-tts-metal-macos
          path: dist-metal/
          retention-days: 30

# ──────────────────────────────────────────────────────────────────────────────
# Vulkan — Windows + LunarG Vulkan SDK
# ──────────────────────────────────────────────────────────────────────────────
  build-vulkan:
    name: Vulkan (Windows)
    if: ${{ github.event.inputs.backend == 'vulkan' || github.event.inputs.backend == 'all' }}
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          vulkan_version: 1.4.309.0
          install_runtime: true
          cache: false

      - name: Set Vulkan env
        shell: pwsh
        run: |
          if (-not $env:VULKAN_SDK) {
            Write-Error "VULKAN_SDK is not set after installation"
            exit 1
          }

          echo "VULKAN_SDK=$env:VULKAN_SDK" >> $env:GITHUB_ENV
          echo "$env:VULKAN_SDK\Bin" >> $env:GITHUB_PATH

      - name: Install SPIRV-Headers and Configure GGML with Vulkan
        shell: pwsh
        run: |
          # Install SPIRV-Headers into a fixed known path
          $instDir = "C:\spirv-headers-install"
          $spirvConfig = "$instDir\share\cmake\SPIRV-Headers\SPIRV-HeadersConfig.cmake"

          if (-not (Test-Path $spirvConfig)) {
            Write-Host "Cloning SPIRV-Headers..."
            $srcDir = "$env:RUNNER_TEMP\SPIRV-Headers"
            git clone --depth 1 --branch main https://github.com/KhronosGroup/SPIRV-Headers.git $srcDir
            if ($LASTEXITCODE -ne 0) { Write-Error "git clone failed"; exit 1 }

            Write-Host "Configuring SPIRV-Headers..."
            & cmake -S $srcDir -B "$srcDir\build" -G Ninja `
              -DCMAKE_BUILD_TYPE=Release `
              "-DCMAKE_INSTALL_PREFIX=$instDir"
            if ($LASTEXITCODE -ne 0) { Write-Error "SPIRV-Headers cmake configure failed"; exit 1 }

            Write-Host "Building SPIRV-Headers..."
            & cmake --build "$srcDir\build" --config Release
            if ($LASTEXITCODE -ne 0) { Write-Error "SPIRV-Headers cmake build failed"; exit 1 }

            Write-Host "Installing SPIRV-Headers..."
            & cmake --install "$srcDir\build"
            if ($LASTEXITCODE -ne 0) { Write-Error "SPIRV-Headers cmake install failed"; exit 1 }
          }

          if (-not (Test-Path $spirvConfig)) {
            Write-Error "SPIRV-HeadersConfig.cmake not found at expected path: $spirvConfig"
            exit 1
          }
          Write-Host "SPIRV-Headers ready at: $instDir"

          # Configure GGML with install prefix passed directly
          $prefixPath = $instDir -replace '\\', '/'
          Write-Host "Configuring GGML with CMAKE_PREFIX_PATH=$prefixPath"
          & cmake -S ggml -B ggml\build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            "-DCMAKE_PREFIX_PATH=$prefixPath"
          if ($LASTEXITCODE -ne 0) { Write-Error "GGML cmake configure failed"; exit 1 }

      - name: Build GGML
        shell: cmd
        run: cmake --build ggml\build --config Release -j 4

      - name: Configure project
        shell: cmd
        run: >
          cmake -S . -B build-release
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        shell: cmd
        run: cmake --build build-release --config Release -j 4

      - name: Package artifact
        shell: pwsh
        run: |
          $out = "dist-vulkan"
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          New-Item -ItemType Directory -Path "$out\include" -Force | Out-Null

          Copy-Item build-release\qwen3-tts-cli.exe $out\ -ErrorAction SilentlyContinue
          Copy-Item build-release\qwen3tts.dll       $out\ -ErrorAction SilentlyContinue
          Get-ChildItem build-release\ggml*.dll      | Copy-Item -Destination $out\ -Force -ErrorAction SilentlyContinue
          Copy-Item src\qwen3tts_c_api.h "$out\include\" -ErrorAction SilentlyContinue

          # Copy Vulkan runtime DLL so the artifact is self-contained
          $vulkanRuntime = "$env:VULKAN_SDK\Bin\vulkan-1.dll"
          if (Test-Path $vulkanRuntime) {
            Copy-Item $vulkanRuntime $out\ -Force
            Write-Host "Copied vulkan-1.dll from $vulkanRuntime"
          } else {
            Write-Warning "vulkan-1.dll not found at $vulkanRuntime — artifact may not be self-contained"
          }

          # Verify ggml-vulkan.dll was staged
          if (-not (Test-Path "$out\ggml-vulkan.dll")) {
            Write-Warning "ggml-vulkan.dll not found in artifact — Vulkan backend may not be functional"
            Get-ChildItem $out
          } else {
            Write-Host "Artifact contents:"
            Get-ChildItem $out | Select-Object Name, Length
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-tts-vulkan-windows-x64
          path: dist-vulkan/
          retention-days: 30
